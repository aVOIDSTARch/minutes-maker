packages:
  - apps/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  "@types/node": ^25.9.3
  typescript: ^5.9.3
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: ^0.1.24
  react: ^19.2.7
  react-dom: ^19.2.7
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
  "@vitejs/plugin-react": ^6.0.2
  prettier: 3.8.4
  "@biomejs/biome": ^2.5.0
  "@biomejs/js-api": ^6.0.0
  "@avoidstarch/ts-kit": github:aVOIDSTARch/ts-kit
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
